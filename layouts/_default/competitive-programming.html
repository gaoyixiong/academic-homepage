{{ define "main" }}

<div class="competitive-programming-page mx-auto w-full px-4 pb-8 sm:px-6">
  <article class="w-full break-words">
    <main class="w-full min-w-0">
      <h1 class="site-page-title text-center font-bold tracking-tight text-slate-900 dark:text-slate-100">
        {{- .Title -}}
      </h1>

      <div class="mx-auto mt-12 max-w-prose prose prose-slate lg:prose-xl dark:prose-invert">
        {{ .Content }}
      </div>
    </main>
  </article>
</div>

{{ end }}
