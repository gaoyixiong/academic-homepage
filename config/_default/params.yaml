# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: system
  color: blue

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'I am a Ph.D student in the Department of Computer Science at City University of Hong Kong, and I am fortunate to be advised by Prof. Minming Li.'
    twitter: 'GetResearchDev'
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: navbar

# Site footer
footer:
  copyright:
    notice: '© {year} Yixiong Colin Gao'
    license:
      enable: false

# Hide the Hugo Blox attribution in the site footer.
i_am_a_sponsor: true
power_ups:
  hide_published_with: true

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    # Publication pages use MathJax via the custom head hook.
    enable: false
  privacy_pack:
    enable: false
